<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>SevaSetu — Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="skeletonneedoverview.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-logo"></div>
        <div class="sidebar-icon"></div>
        <div class="sidebar-icon"></div>
        <div class="sidebar-icon active"></div>
        <div class="sidebar-icon"></div>
        <div class="sidebar-spacer"></div>
        <div class="sidebar-icon"></div>
    </aside>

    <div class="main">
        <nav class="topnav">
            <div class="skel topnav-brand"></div>
            <div class="skel topnav-search"></div>
            <div class="topnav-spacer"></div>
            <div class="skel topnav-icon"></div>
            <div class="skel topnav-icon"></div>
            <div class="skel topnav-avatar"></div>
        </nav>

        <div class="content-body">
            <div class="left-panel">
                <div class="page-header">
                    <div class="skel header-label"></div>
                    <div class="skel header-title"></div>
                </div>

                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div class="tabs">
                        <div class="skel tab active"></div>
                        <div class="skel tab"></div>
                        <div class="skel tab"></div>
                        <div class="skel tab"></div>
                    </div>
                </div>

                <div class="filter-bar">
                    <div class="skel filter-chip"></div>
                    <div class="skel filter-chip sm"></div>
                    <div class="skel filter-chip"></div>
                    <div class="filter-spacer"></div>
                    <div class="skel filter-btn"></div>
                </div>

                <div class="table-card">
                    <div class="table-header">
                        <div class="th"></div>
                        <div class="th"></div>
                        <div class="th"></div>
                        <div class="th"></div>
                        <div class="th"></div>
                        <div class="th"></div>
                    </div>

                    <div class="table-row row-1">
                        <div class="cell-urgency">
                            <div class="urgency-dot red"></div>
                            <div class="skel urgency-num"></div>
                        </div>
                        <div class="skel cell-title"></div>
                        <div class="skel cell-badge"></div>
                        <div class="cell-loc">
                            <div class="skel cell-loc-main"></div>
                            <div class="skel cell-loc-sub"></div>
                        </div>
                        <div class="cell-volunteer">
                            <div class="skel vol-avatar"></div>
                            <div class="skel vol-name"></div>
                        </div>
                        <div class="skel cell-status"></div>
                    </div>

                    <div class="table-row row-2">
                        <div class="cell-urgency">
                            <div class="urgency-dot amber"></div>
                            <div class="skel urgency-num"></div>
                        </div>
                        <div class="skel cell-title" style="width:78%"></div>
                        <div class="skel cell-badge"></div>
                        <div class="cell-loc">
                            <div class="skel cell-loc-main" style="width:80%"></div>
                            <div class="skel cell-loc-sub"></div>
                        </div>
                        <div class="cell-volunteer">
                            <div class="skel vol-avatar"></div>
                            <div class="skel vol-name"></div>
                        </div>
                        <div class="skel cell-status"></div>
                    </div>

                    <div class="table-row row-3">
                        <div class="cell-urgency">
                            <div class="urgency-dot green"></div>
                            <div class="skel urgency-num"></div>
                        </div>
                        <div class="skel cell-title" style="width:70%"></div>
                        <div class="skel cell-badge"></div>
                        <div class="cell-loc">
                            <div class="skel cell-loc-main" style="width:75%"></div>
                            <div class="skel cell-loc-sub" style="width:55%"></div>
                        </div>
                        <div class="cell-volunteer">
                            <div class="skel vol-avatar"></div>
                            <div class="skel vol-name" style="width:60px"></div>
                        </div>
                        <div class="skel cell-status"></div>
                    </div>
                </div>
            </div>

            <div class="right-panel">
                <div class="ai-card">
                    <div class="ai-card-header">
                        <div class="ai-icon"></div>
                        <div class="ai-header-text">
                            <div class="skel ai-title-skel"></div>
                            <div class="skel ai-conf-skel"></div>
                        </div>
                    </div>
                    <div class="skel ai-body-line w-full"></div>
                    <div class="skel ai-body-line w-90"></div>
                    <div class="skel ai-body-line w-75"></div>
                </div>

                <div class="snapshot">
                    <div class="skel snapshot-title"></div>
                    <div class="snapshot-row">
                        <div class="skel snapshot-label"></div>
                        <div class="skel snapshot-value sm"></div>
                    </div>
                    <div class="snapshot-row">
                        <div class="skel snapshot-label"></div>
                        <div class="skel snapshot-value"></div>
                    </div>
                    <div class="snapshot-row">
                        <div class="skel snapshot-label"></div>
                        <div style="display:flex; flex-direction:column; gap:4px; align-items:flex-end;">
                            <div class="skel snapshot-value"></div>
                            <div class="skel snapshot-value sm" style="width:70px"></div>
                        </div>
                    </div>

                    <div class="ngo-card-skel">
                        <div class="skel ngo-logo"></div>
                        <div class="ngo-info">
                            <div class="skel ngo-name"></div>
                            <div class="skel ngo-trust"></div>
                        </div>
                    </div>
                </div>

                <div class="panel-buttons">
                    <div class="btn-primary"></div>
                    <div class="btn-row">
                        <div class="skel btn-secondary"></div>
                        <div class="skel btn-secondary"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="sketonneedoverview.js"></script>
</body>
</html>
