<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SevaSetu - Volunteer Profile</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        tailwind.config = {

                        "on-error-container": "#93000a",

                        "on-secondary-fixed": "#2a1700",
                        "inverse-primary": "#77daa4",
                        "surface-container": "#e6eeff",
                        "secondary-fixed": "#ffddb8",
                        "background": "#f8f9ff",
                        "secondary": "#855300",
                        "surface-bright": "#f8f9ff",
                        "outline-variant": "#bdcabf",
                        "tertiary-fixed-dim": "#ffb3b0",
                        "surface-variant": "#d9e3f6",
                        "outline": "#6e7a71",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#684000",
                        "on-primary-container": "#003d25",
                        "tertiary-fixed": "#ffdad8",
                        "on-primary-fixed-variant": "#005232",
                        "inverse-surface": "#27313f",
                        "surface": "#f8f9ff",
                        "on-error": "#ffffff",
                        "primary-container": "#4caf7d",
                        "tertiary-container": "#fa7272",
                        "primary-fixed-dim": "#77daa4",
                        "on-tertiary-fixed-variant": "#881d24",
                        "on-background": "#121c2a",

                    "borderRadius": {

                        "headline": ["Plus Jakarta Sans"],
                        "display": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]

                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8f9ff;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
        }
        .sage-gradient {
            background: linear-gradient(135deg, #006c44 0%, #4caf7d 100%);
        }
    </style>
</head>
<body class="bg-surface text-on-surface">
<!-- TopNavBar -->
<header class="bg-[#f8f9ff]/80 dark:bg-[#121c2a]/80 backdrop-blur-xl no-border shadow-[0_20px_40px_rgba(0,108,68,0.06)] fixed top-0 w-full z-50">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-screen-2xl mx-auto font-['Plus_Jakarta_Sans'] tracking-tight">
<div class="text-2xl font-bold text-[#006c44] dark:text-[#4caf7d] tracking-tighter">
                SevaSetu
            </div>
<nav class="hidden md:flex items-center gap-8">
<a class="text-[#3e4942] dark:text-slate-400 hover:text-[#006c44] transition-all duration-300" href="#">Discover</a>
<a class="text-[#3e4942] dark:text-slate-400 hover:text-[#006c44] transition-all duration-300" href="#">Impact</a>
<a class="text-[#3e4942] dark:text-slate-400 hover:text-[#006c44] transition-all duration-300" href="#">Community</a>
</nav>
<div class="flex items-center gap-4">
<button class="material-symbols-outlined text-[#3e4942] hover:bg-[#f1f5f9] p-2 rounded-full transition-all">notifications</button>
<button class="material-symbols-outlined text-[#3e4942] hover:bg-[#f1f5f9] p-2 rounded-full transition-all">favorite</button>
<img alt="User profile avatar" class="w-10 h-10 rounded-full border-2 border-primary-fixed shadow-sm" data-alt="Close up portrait of a smiling young man with kind eyes against a soft blurry outdoor background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrYFHXJhHygewFS5C4FMqkrODZBj21lh5cYrrJYVveXjs_dCW0I-zZGEG7p24XwaS227-FqioeDfSeScYiYT-VivrdqWZMnrNpty3uhAAUswxJcR5Y8rfNZJibs93HsPdvAJyHRJEfntNkz5ManfTVFIRn5SGO89TI4IJVgbeL97-mb6kF6-ZC-ObzRGp0CHz37OVBT4ay8x9jvKV0UDVmHkbY-OWxXirvlaJ7M0B3p8shigQUWdqOalE3eHH3df_ud8oP_LUGzlG8"/>
</div>
</div>
</header>
<main class="pt-28 pb-12 px-6 max-w-screen-2xl mx-auto flex flex-col gap-10">
<!-- Profile Header Section -->
<section class="relative bg-surface-container-lowest rounded-lg p-8 md:p-12 shadow-[0_20px_40px_rgba(0,108,68,0.06)] overflow-hidden">

    <!-- Background Effect -->
    <div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed/20 rounded-full -mr-20 -mt-20 blur-3xl"></div>

    <div class="relative flex flex-col md:flex-row items-center md:items-start gap-8">

        <!-- PROFILE IMAGE -->
        <div class="relative">
            <img id="volunteerImage"
                 class="w-40 h-40 md:w-48 md:h-48 rounded-full object-cover border-4 border-white shadow-xl"
                 src=""
                 alt="Volunteer Profile Image" />
        </div>

        <!-- PROFILE INFO -->
        <div class="flex-1 text-center md:text-left">

            <!-- NAME -->
            <h1 id="volunteerName"
                class="text-4xl font-extrabold text-on-surface tracking-tight mb-3">
                <!-- JS will insert name -->
            </h1>

            <!-- BIO -->
            <p id="volunteerBio"
               class="text-lg text-on-surface-variant max-w-2xl leading-relaxed mb-6">
                <!-- JS will insert bio -->
            </p>

            <!-- ACTION -->
            <div class="flex justify-center md:justify-start">
                <button id="messageBtn"
                        class="sage-gradient text-white px-8 py-3 rounded-full font-bold shadow-lg shadow-primary/20 hover:scale-105 transition-transform">
                    Message
                </button>
            </div>

        </div>
    </div>
</section>
<!-- Bento Grid Main Content -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- Left Column -->
    <div class="lg:col-span-4 flex flex-col gap-8">

        <!-- Skills & Expertise -->
        <div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(0,108,68,0.04)]">

            <h3 class="text-sm font-bold text-on-surface-variant tracking-[0.05em] uppercase mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">psychology</span>
                Skills & Expertise
            </h3>

            <!-- SKILLS CONTAINER -->
            <div id="skillsContainer" class="flex flex-wrap gap-2">
                <!-- JS will inject skills -->
            </div>

        </div>


        <!-- Availability & Service -->
        <div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(0,108,68,0.04)]">

            <h3 class="text-sm font-bold text-on-surface-variant tracking-[0.05em] uppercase mb-6 flex items-center gap-2">
                <span class="material-symbols-outlined text-secondary">calendar_today</span>
                Availability
            </h3>

            <div class="space-y-4">

                <!-- Schedule -->
                <div class="flex justify-between items-center py-2 border-b border-surface-container">
                    <span class="text-on-surface-variant">Schedule</span>
                    <span id="availabilitySchedule" class="font-bold text-primary">
                        <!-- JS -->
                    </span>
                </div>

                <!-- Radius -->
                <div class="flex justify-between items-center py-2 border-b border-surface-container">
                    <span class="text-on-surface-variant">Radius</span>
                    <span id="availabilityRadius" class="font-bold text-primary">
                        <!-- JS -->
                    </span>
                </div>

                <!-- Urgent -->
                <div class="flex justify-between items-center py-2">
                    <span class="text-on-surface-variant">Urgent Help</span>
                    <span id="availabilityUrgent"
                          class="flex items-center gap-2 font-bold text-secondary">
                        <!-- JS -->
                    </span>
                </div>

            </div>

        </div>

    </div>
<!-- Right Column -->
<div class="lg:col-span-8 flex flex-col gap-8">

    <!-- ========================= -->
    <!-- My Impact Stats -->
    <!-- ========================= -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Hours Helped -->
        <div class="bg-primary-fixed text-on-primary-fixed p-8 rounded-lg flex flex-col items-center text-center shadow-lg shadow-primary/5">
            <span id="hoursHelped" class="text-4xl font-extrabold mb-1">
                <!-- JS -->
            </span>
            <span class="text-sm font-bold tracking-widest opacity-80 uppercase">
                Hours Helped
            </span>
        </div>

        <!-- Tasks Completed -->
        <div class="bg-secondary-fixed text-on-secondary-fixed p-8 rounded-lg flex flex-col items-center text-center shadow-lg shadow-secondary/5">
            <span id="tasksCompleted" class="text-4xl font-extrabold mb-1">
                <!-- JS -->
            </span>
            <span class="text-sm font-bold tracking-widest opacity-80 uppercase">
                Tasks Completed
            </span>
        </div>

        <!-- NGOs Assisted -->
        <div class="bg-tertiary-fixed text-on-tertiary-fixed p-8 rounded-lg flex flex-col items-center text-center shadow-lg shadow-tertiary/5">
            <span id="ngosAssisted" class="text-4xl font-extrabold mb-1">
                <!-- JS -->
            </span>
            <span class="text-sm font-bold tracking-widest opacity-80 uppercase">
                NGOs Assisted
            </span>
        </div>

    </div>


    <!-- ========================= -->
    <!-- Recent Assignments -->
    <!-- ========================= -->
    <div class="bg-surface-container-lowest rounded-lg p-8 shadow-[0_20px_40px_rgba(0,108,68,0.04)]">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h3 class="text-sm font-bold text-on-surface-variant tracking-[0.05em] uppercase flex items-center gap-2">
                <span class="material-symbols-outlined text-primary">assignment_turned_in</span>
                Recent Assignments
            </h3>

            <!-- Optional: later connect -->
            <!-- <a class="text-sm font-bold text-primary hover:underline" href="#">View History</a> -->
        </div>

        <!-- ASSIGNMENT LIST -->
        <div id="assignmentList" class="space-y-4">
            <!-- JS will inject task cards here -->
        </div>

    </div>

</div>
<!-- Mobile Bottom Navigation -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-lg px-6 py-3 flex justify-between items-center z-50 border-t border-surface-container">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">dashboard</span>
<span class="text-[10px] font-bold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">volunteer_activism</span>
<span class="text-[10px] font-medium">Missions</span>
</button>
<button class="bg-primary w-12 h-12 rounded-full flex items-center justify-center text-white -mt-8 shadow-xl border-4 border-surface shadow-primary/30">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">group</span>
<span class="text-[10px] font-medium">Network</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined">person</span>
<span class="text-[10px] font-medium">Profile</span>
</button>
</nav>
<script src="{{ url_for('static', filename='js/vol-profile.js') }}"></script>
</body></html>
