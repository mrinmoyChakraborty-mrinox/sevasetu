<style>

  /* Location geocode status indicator */

  .skel { background:#e2e8f0; border-radius:6px; animation:skelPulse 1.4s ease infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .spin { animation:spin 1s linear infinite; display:inline-block; }

<script>
const reportId = window.location.pathname.split('/').pop();
let needsData  = [];
let OLA_MAPS_API_KEY = null;

const CATEGORIES = ['Healthcare','Education','Logistics','Food & Nutrition','Shelter','Mental Health','Water & Sanitation','Environment','Other'];

// ── Load OlaMaps key ────────────────────────────────────────
async function loadOlaMapsKey() {
  try {
    const res  = await fetch('/api/get_ola_maps_key');
    const data = await res.json();
    OLA_MAPS_API_KEY = data.OLA_MAPS_API_KEY;
  } catch {}
}

// ── Forward-geocode a location string via OlaMaps ───────────
// Returns { city, lat, lng } or null
async function geocodeText(text) {
  if (!OLA_MAPS_API_KEY || !text.trim()) return null;
  try {
    const res  = await fetch(
      `https://api.olamaps.io/places/v1/textsearch?input=${encodeURIComponent(text)}&api_key=${OLA_MAPS_API_KEY}`
    );
    const data = await res.json();
    const results = data.results || [];
    if (!results.length) return null;

    const first = results[0];
    const geo   = first.geometry?.location || {};
    if (!geo.lat || !geo.lng) return null;

    // Extract city name
    const components = first.address_components || [];
    let city = '';
    for (const c of components) {
      if ((c.types||[]).includes('locality')) { city = c.long_name; break; }
    }
    if (!city) {
      for (const c of components) {
        if ((c.types||[]).includes('administrative_area_level_2')) { city = c.long_name; break; }
      }
    }
    if (!city) city = (first.formatted_address || text).split(',')[0].trim();

    return { city, lat: geo.lat, lng: geo.lng };
  } catch {
    return null;
  }
}

// ── Urgency badge color ─────────────────────────────────────
function urgencyBadgeClass(score) {
  if (score >= 8) return 'bg-tertiary-fixed text-on-tertiary-fixed';
  if (score >= 5) return 'bg-secondary-fixed text-on-secondary-container';
  return 'bg-primary-fixed text-on-primary-fixed';
}

// ── Build a need card ───────────────────────────────────────
function buildCard(need, idx) {
  const accentColors = [
    'bg-primary-container','bg-secondary-container','bg-tertiary-container',
    'bg-primary-fixed-dim','bg-secondary-fixed-dim','bg-tertiary-fixed-dim'
  ];
  const accent = accentColors[idx % accentColors.length];

  const skillChips = (need.required_skills || []).map(s => `
    <span class="skill-chip" data-skill="${escHtml(s)}">
      ${escHtml(s)}
      <button type="button" onclick="removeSkill('${need.id}','${escHtml(s)}')" title="Remove skill">
        <span class="material-symbols-outlined" style="font-size:13px">close</span>
      </button>
    </span>`).join('');

  const catOptions = CATEGORIES.map(c =>
    `<option ${c===need.category?'selected':''}>${c}</option>`
  ).join('');

  // ── Location display ─────────────────────────────────────
  // need.location is always a { city, lat, lng } dict from geocoding_service
  // Show city text in the input; lat/lng stored in hidden fields
  const locObj   = (typeof need.location === 'object' && need.location) ? need.location : { city: need.location || '', lat: null, lng: null };
  const cityText = locObj.city || '';
  const hasCoords = locObj.lat && locObj.lng;

  return `
  <article class="need-card bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_40px_rgba(0,108,68,0.06)] relative overflow-hidden ${need.included?'':'excluded'}"
           id="card-${need.id}" data-id="${need.id}">
    <div class="absolute top-0 left-0 w-2 h-full ${accent} rounded-l-xl"></div>

    <div class="flex flex-col lg:flex-row gap-8">
      <!-- Left: editable fields -->
      <div class="flex-1 space-y-5">
        <!-- Title + Toggle -->
        <div class="flex justify-between items-start gap-4">
          <div class="flex-1">
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Title</label>
            <input type="text" class="form-field w-full text-xl font-bold"
                   value="${escHtml(need.title)}"
                   onchange="updateField('${need.id}','title',this.value)"/>
          </div>
          <div class="flex items-center gap-2 pt-7 flex-shrink-0">
            <span class="text-sm font-semibold text-on-surface-variant">Include</span>
            <button type="button" class="toggle-btn ${need.included?'on':'off'} w-12 h-6 rounded-full relative"
                    id="toggle-${need.id}"
                    onclick="toggleInclude('${need.id}')">
              <div class="toggle-thumb absolute top-1 w-4 h-4 rounded-full shadow"></div>
            </button>
          </div>
        </div>

        <!-- Description -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Description</label>
          <textarea class="form-field w-full resize-y" rows="3"
                    onchange="updateField('${need.id}','description',this.value)">${escHtml(need.description||'')}</textarea>
        </div>

        <!-- Category + Location -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Category</label>
            <select class="form-field w-full cursor-pointer"
                    onchange="updateField('${need.id}','category',this.value)">${catOptions}</select>
          </div>

          <!-- ── Location field with geocoding feedback ── -->
          <div>
            <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Location</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-3 top-3 text-on-surface-variant text-sm pointer-events-none">location_on</span>
              <input type="text"
                     id="loc-input-${need.id}"
                     class="form-field w-full pl-9"
                     value="${escHtml(cityText)}"
                     placeholder="e.g. Zone 4, Mumbai"
                     onchange="handleLocationChange('${need.id}', this.value)"/>
            </div>
            <!-- Hidden lat/lng — updated by geocoder -->
            <input type="hidden" id="loc-lat-${need.id}" value="${locObj.lat || ''}"/>
            <input type="hidden" id="loc-lng-${need.id}" value="${locObj.lng || ''}"/>
            <!-- Geocode status indicator -->
            <div id="loc-status-${need.id}" class="loc-status ${hasCoords ? 'geocoded' : 'empty'}">
              ${hasCoords
                ? `<span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">check_circle</span> Coordinates resolved (${Number(locObj.lat).toFixed(4)}, ${Number(locObj.lng).toFixed(4)})`
                : cityText
                  ? `<span class="material-symbols-outlined" style="font-size:12px">info</span> No coordinates — will geocode on publish`
                  : `<span class="material-symbols-outlined" style="font-size:12px">location_off</span> No location set`
              }
            </div>
          </div>
        </div>

        <!-- Estimated People -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-2">Estimated People Affected</label>
          <input type="number" min="1" class="form-field w-40"
                 value="${need.estimated_people||''}"
                 placeholder="e.g. 120"
                 onchange="updateField('${need.id}','estimated_people',parseInt(this.value)||null)"/>
        </div>
      </div>

      <!-- Right: urgency + skills -->
      <div class="w-full lg:w-72 space-y-7 bg-surface-container-low/60 p-6 rounded-xl border border-outline-variant/10">
        <!-- Urgency Slider -->
        <div>
          <div class="flex justify-between items-center mb-4">
            <label class="text-xs font-bold text-on-surface-variant uppercase tracking-widest">Urgency Level</label>
            <span id="urgency-badge-${need.id}" class="px-3 py-1 rounded-full text-xs font-black ${urgencyBadgeClass(need.urgency_score||5)}">
              ${need.urgency_score||5} / 10
            </span>
          </div>
          <input type="range" min="1" max="10" class="urgency-slider w-full"
                 value="${need.urgency_score||5}"
                 id="urgency-slider-${need.id}"
                 oninput="updateUrgency('${need.id}',this.value)"/>
          <div class="flex justify-between mt-2 text-[10px] font-bold text-on-surface-variant opacity-60">
            <span>LOW</span><span>HIGH</span>
          </div>
          ${need.urgency_inferred ? `
          <p class="text-[10px] text-on-surface-variant mt-2 flex items-center gap-1 opacity-60">
            <span class="material-symbols-outlined" style="font-size:11px">info</span>
            AI inferred: ${escHtml(need.urgency_reason||'')}
          </p>` : ''}
        </div>

        <!-- Skills -->
        <div>
          <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-3">Required Skills</label>
          <div id="skills-${need.id}" class="flex flex-wrap gap-2 mb-3">
            ${skillChips}
          </div>
          <div class="flex gap-2">
            <input type="text" id="skill-input-${need.id}" class="form-field flex-1 text-sm" placeholder="Add skill…"
                   onkeydown="if(event.key==='Enter'){addSkill('${need.id}');event.preventDefault();}"/>
            <button type="button" onclick="addSkill('${need.id}')"
                    class="px-3 py-2 bg-primary/10 text-primary rounded-lg font-bold text-sm hover:bg-primary/20 transition-colors">+</button>
          </div>
        </div>
      </div>
    </div>
  </article>`;
}

// ── Handle location field change ────────────────────────────
// Debounced — geocodes 800ms after the user stops typing
const _geocodeTimers = {};

async function handleLocationChange(id, text) {
  const need = needsData.find(n => n.id === id);
  if (!need) return;

  // Update the in-memory location city immediately
  // lat/lng will be updated after geocoding completes
  if (typeof need.location === 'object') {
    need.location = { ...need.location, city: text };
  } else {
    need.location = { city: text, lat: null, lng: null };
  }

  // Update hidden fields
  document.getElementById(`loc-lat-${id}`).value = '';
  document.getElementById(`loc-lng-${id}`).value = '';

  const statusEl = document.getElementById(`loc-status-${id}`);
  if (!text.trim()) {
    statusEl.className = 'loc-status empty';
    statusEl.innerHTML = `<span class="material-symbols-outlined" style="font-size:12px">location_off</span> No location set`;
    return;
  }

  // Show "geocoding…" immediately
  statusEl.className = 'loc-status geocoding';
  statusEl.innerHTML = `<span class="material-symbols-outlined spin" style="font-size:12px">sync</span> Looking up coordinates…`;

  // Debounce — wait 800ms before hitting the API
  clearTimeout(_geocodeTimers[id]);
  _geocodeTimers[id] = setTimeout(async () => {
    const result = await geocodeText(text);
    if (result) {
      // Update need.location in memory
      need.location = result;
      // Update hidden fields
      document.getElementById(`loc-lat-${id}`).value = result.lat;
      document.getElementById(`loc-lng-${id}`).value = result.lng;
      // Show success
      statusEl.className = 'loc-status geocoded';
      statusEl.innerHTML = `<span class="material-symbols-outlined" style="font-size:12px;font-variation-settings:'FILL' 1">check_circle</span> Coordinates resolved (${result.lat.toFixed(4)}, ${result.lng.toFixed(4)})`;
    } else {
      // Geocoding failed — keep city text, coords will be resolved at publish time server-side
      need.location = { city: text, lat: null, lng: null };
      statusEl.className = 'loc-status failed';
      statusEl.innerHTML = `<span class="material-symbols-outlined" style="font-size:12px">warning</span> Coordinates not found — server will retry on publish`;
    }
  }, 800);
}

// ── Toggle include ──────────────────────────────────────────
function toggleInclude(id) {
  const need = needsData.find(n => n.id === id);
  if (!need) return;
  need.included = !need.included;
  const card   = document.getElementById(`card-${id}`);
  const toggle = document.getElementById(`toggle-${id}`);
  card.classList.toggle('excluded', !need.included);
  toggle.className = `toggle-btn ${need.included?'on':'off'} w-12 h-6 rounded-full relative`;
  updateIncludedCount();
}

// ── Update a field ──────────────────────────────────────────
function updateField(id, field, value) {
  const need = needsData.find(n => n.id === id);
  if (need) need[field] = value;
}

// ── Urgency slider ──────────────────────────────────────────
function updateUrgency(id, val) {
  const score = parseInt(val);
  const need  = needsData.find(n => n.id === id);
  if (need) {
    need.urgency_score = score;
    need.urgency_label = score >= 8 ? 'HIGH' : score >= 5 ? 'MEDIUM' : 'LOW';
  }
  const badge = document.getElementById(`urgency-badge-${id}`);
  if (badge) {
    badge.textContent  = `${score} / 10`;
    badge.className    = `px-3 py-1 rounded-full text-xs font-black ${urgencyBadgeClass(score)}`;
  }
}

// ── Skills ──────────────────────────────────────────────────
function addSkill(id) {
  const input = document.getElementById(`skill-input-${id}`);
  const skill = input.value.trim();
  if (!skill) return;
  const need = needsData.find(n => n.id === id);
  if (!need) return;
  if (!need.required_skills) need.required_skills = [];
  if (need.required_skills.includes(skill)) { input.value = ''; return; }
  need.required_skills.push(skill);
  input.value = '';
  const wrap = document.getElementById(`skills-${id}`);
  const chip = document.createElement('span');
  chip.className      = 'skill-chip';
  chip.dataset.skill  = skill;
  chip.innerHTML      = `${escHtml(skill)}<button type="button" onclick="removeSkill('${id}','${escHtml(skill)}')" title="Remove"><span class="material-symbols-outlined" style="font-size:13px">close</span></button>`;
  wrap.appendChild(chip);
}

function removeSkill(id, skill) {
  const need = needsData.find(n => n.id === id);
  if (need) need.required_skills = (need.required_skills||[]).filter(s => s !== skill);
  const wrap  = document.getElementById(`skills-${id}`);
  wrap.querySelectorAll('.skill-chip').forEach(c => { if (c.dataset.skill === skill) c.remove(); });
}

// ── Count included ──────────────────────────────────────────
function updateIncludedCount() {
  const n = needsData.filter(x => x.included).length;
  document.getElementById('includedCount').textContent = `${n} need${n!==1?'s':''}`;
}

// ── Load needs from API ─────────────────────────────────────
async function loadNeeds() {
  try {
    const res = await fetch(`/api/ngo/report/${reportId}/needs`);
    if (res.status === 401) { window.location.href = '/getstarted'; return; }
    if (!res.ok) throw new Error();
    const data = await res.json();

    needsData = (data.needs || []).map(n => ({ ...n, included: true }));

    const fname = data.file_name || 'your report';
    document.getElementById('subheading').innerHTML =
      `We found <strong>${needsData.length}</strong> community need${needsData.length!==1?'s':''} in <span class="text-primary font-bold">${escHtml(fname)}</span>`;

    document.getElementById('needsList').innerHTML =
      needsData.length
        ? needsData.map((n, i) => buildCard(n, i)).join('')
        : `<div class="text-center py-20 text-on-surface-variant">
             <span class="material-symbols-outlined text-5xl block mb-3">search_off</span>
             <p class="font-bold">No needs were extracted from this report.</p>
             <p class="text-sm mt-1">Try uploading a different document.</p>
           </div>`;

    updateIncludedCount();
    document.getElementById('footerActions').classList.remove('hidden');
  } catch {
    document.getElementById('needsList').innerHTML = `
      <div class="text-center py-20">
        <p class="font-bold text-tertiary">Failed to load needs.</p>
        <button onclick="loadNeeds()" class="mt-3 px-6 py-2 bg-primary text-white rounded-full font-bold text-sm">Retry</button>
      </div>`;
  }
}

// ── Publish ─────────────────────────────────────────────────
document.getElementById('publishBtn').addEventListener('click', async () => {
  const toPublish = needsData.filter(n => n.included);
  if (!toPublish.length) { showToast('Select at least one need to publish.','error'); return; }

  const btn = document.getElementById('publishBtn');
  btn.disabled   = true;
  btn.innerHTML  = `<span class="material-symbols-outlined spin">sync</span> Publishing…`;

  // Build the payload — send the full location object so server
  // can skip re-geocoding when coords are already present
  const payload = toPublish.map(n => ({
    id:               n.id,
    title:            n.title,
    description:      n.description,
    category:         n.category,
    urgency_score:    n.urgency_score,
    urgency_label:    n.urgency_label,
    required_skills:  n.required_skills || [],
    location:         n.location,       // { city, lat, lng } or plain string
    estimated_people: n.estimated_people,
  }));

  try {
    const res = await fetch(`/api/ngo/report/${reportId}/publish`, {
      method:  'POST',
      headers: {'Content-Type':'application/json'},
      body:    JSON.stringify({ needs: payload })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    showToast(`${toPublish.length} need${toPublish.length!==1?'s':''} published! Matching volunteers…`, 'success');
    setTimeout(() => window.location.href = '/ngo/dashboard', 2000);
  } catch {
    btn.disabled  = false;
    btn.innerHTML = `Confirm & Post All Needs <span class="material-symbols-outlined">send</span>`;
    showToast('Failed to publish. Please try again.','error');
  }
});

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='success') {
  const wrap = document.getElementById('toast-wrap');
  const el   = document.createElement('div');
  el.style.cssText = `background:white;border-left:4px solid ${type==='success'?'#006c44':'#ba1a1a'};
    border-radius:.75rem;padding:14px 18px;box-shadow:0 8px 32px rgba(0,0,0,.12);
    font-size:.875rem;font-weight:500;max-width:300px;cursor:pointer;
    font-family:'Plus Jakarta Sans',sans-serif;color:#121c2a;`;
  el.textContent = msg;
  el.onclick = () => el.remove();
  wrap.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); },4000);
}

const st = document.createElement('style');
st.textContent = `@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin 1s linear infinite;display:inline-block}`;
document.head.appendChild(st);

// Init
loadOlaMapsKey().then(loadNeeds);
</script>
</body>
