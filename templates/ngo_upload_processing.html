<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Processing | SevaSetu</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='images/only_logo.png') }}">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = { theme: { extend: {
  colors: {
    "primary":"#006c44","primary-container":"#4caf7d","primary-fixed":"#93f7bf","primary-fixed-dim":"#77daa4",
    "on-primary":"#ffffff","on-primary-container":"#003d25",
    "secondary":"#855300","secondary-container":"#fea619","secondary-fixed":"#ffddb8",
    "on-secondary":"#ffffff","on-secondary-container":"#684000",
    "tertiary":"#a83639","tertiary-fixed":"#ffdad8","on-tertiary":"#ffffff",
    "surface":"#f8f9ff","surface-container-lowest":"#ffffff","surface-container-low":"#eff4ff",
    "surface-container":"#e6eeff","surface-container-high":"#dee9fc","surface-container-highest":"#d9e3f6",
    "on-surface":"#121c2a","on-surface-variant":"#3e4942",
    "outline":"#6e7a71","outline-variant":"#bdcabf","background":"#f8f9ff"
  },
  fontFamily:{"headline":["Plus Jakarta Sans"],"body":["Plus Jakarta Sans"]},
  borderRadius:{"DEFAULT":"1rem","lg":"2rem","xl":"3rem","full":"9999px"}
}}}
</script>
<style>
  body { font-family:'Plus Jakarta Sans',sans-serif; background:#f4f7f4; overflow:hidden; }
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; }

  /* Shimmer progress bar */
  .progress-shimmer {
    background: linear-gradient(90deg, #4caf7d 0%, #93f7bf 50%, #4caf7d 100%);
    background-size: 200% 100%;
    animation: shimmer 2s infinite linear;
    transition: width 0.8s ease;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* AI pulse ring */
  .ai-pulse-ring {
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 3px solid rgba(0,108,68,0.2);
    animation: pulseRing 2.5s cubic-bezier(.4,0,.6,1) infinite;
  }
  .ai-pulse-ring-2 {
    position: absolute; inset: -24px;
    border-radius: 50%;
    border: 2px solid rgba(0,108,68,0.1);
    animation: pulseRing 2.5s cubic-bezier(.4,0,.6,1) 0.5s infinite;
  }
  @keyframes pulseRing {
    0%  { transform:scale(1);   opacity:1; }
    50% { transform:scale(1.1); opacity:0.4; }
    100%{ transform:scale(1);   opacity:1; }
  }

  /* Step check animation */
  @keyframes stepIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
  .step-item { animation: stepIn 0.4s ease both; }

  /* Dot ping */
  @keyframes ping { 75%,100%{transform:scale(2);opacity:0} }
  .ping { animation: ping 1s cubic-bezier(0,0,.2,1) infinite; }

  /* Floating blobs */
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .float-slow { animation: float 6s ease-in-out infinite; }
  .float-fast { animation: float 4s ease-in-out 1s infinite; }
</style>
</head>
<body class="text-on-surface">

<!-- Header -->
<header class="w-full sticky top-0 z-50 bg-surface/80 backdrop-blur-md shadow-[0_20px_40px_rgba(0,108,68,0.06)] flex justify-between items-center px-6 py-4">
  <div class="flex items-center gap-2.5">
    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary to-primary-container flex items-center justify-center">
      <span class="material-symbols-outlined text-white" style="font-size:16px;font-variation-settings:'FILL' 1">volunteer_activism</span>
    </div>
    <span class="text-xl font-extrabold text-emerald-900 tracking-tighter">SevaSetu</span>
  </div>
  <nav class="hidden md:flex items-center gap-6 text-sm font-semibold">
    <a href="/ngo/dashboard" class="text-on-surface-variant hover:text-primary">Dashboard</a>
    <a href="/ngo/reports" class="text-primary font-bold border-b-2 border-primary pb-0.5">Field Reports</a>
  </nav>
  <button onclick="window.location.href='/ngo/reports'" class="px-5 py-2 rounded-full bg-surface-container-highest text-on-surface font-bold text-sm hover:bg-surface-container-high transition-colors flex items-center gap-1">
    <span class="material-symbols-outlined text-sm">arrow_back</span> Back
  </button>
</header>

<div class="h-[calc(100vh-72px)] flex items-center justify-center p-6 relative overflow-hidden">

  <!-- Background blobs -->
  <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary-fixed/20 blur-[100px] rounded-full pointer-events-none float-slow"></div>
  <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-secondary-fixed/20 blur-[100px] rounded-full pointer-events-none float-fast"></div>

  <!-- Processing Card -->
  <div class="w-full max-w-2xl bg-surface-container-lowest rounded-2xl p-10 text-center relative z-10 shadow-[0_20px_60px_rgba(0,108,68,0.08)] border border-outline-variant/10">

    <!-- AI Icon with pulse rings -->
    <div class="mb-10 relative inline-block">
      <div class="ai-pulse-ring-2"></div>
      <div class="ai-pulse-ring"></div>
      <div class="relative w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-[inset_0_4px_12px_rgba(0,0,0,0.06)]">
        <span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings:'FILL' 1">auto_awesome</span>
      </div>
    </div>

    <!-- Title -->
    <h1 class="text-3xl md:text-4xl font-extrabold text-on-surface tracking-tight mb-3">Analyzing Your Report</h1>
    <p class="text-on-surface-variant text-base max-w-md mx-auto mb-10">Our AI is reading your document and identifying community needs to help you get started quickly.</p>

    <!-- File + Progress -->
    <div class="bg-surface-container-low rounded-2xl p-6 mb-8 text-left border border-white/60">
      <div class="flex items-center justify-between mb-5">
        <div class="flex items-center gap-4">
          <div class="w-12 h-12 rounded-xl bg-surface-container-highest flex items-center justify-center flex-shrink-0">
            <span id="fileIcon" class="material-symbols-outlined text-secondary">picture_as_pdf</span>
          </div>
          <div>
            <h4 id="fileName" class="font-bold text-on-surface truncate max-w-[200px]">Loading...</h4>
            <p class="text-xs text-on-surface-variant uppercase tracking-wider font-semibold mt-0.5">Report Analysis in Progress</p>
          </div>
        </div>
        <span id="progressPct" class="text-sm font-bold text-primary">0%</span>
      </div>
      <div class="w-full h-3 bg-surface-container-highest rounded-full overflow-hidden">
        <div id="progressBar" class="h-full w-0 progress-shimmer rounded-full"></div>
      </div>
    </div>

    <!-- Step Log -->
    <div id="stepLog" class="space-y-3 mb-10 min-h-[80px]">
      <!-- Steps appended dynamically -->
    </div>

    <!-- Footer Actions -->
    <div class="flex items-center justify-between pt-6 border-t border-outline-variant/20">
      <button onclick="window.location.href='/ngo/reports'"
              class="px-8 py-3 rounded-full text-on-surface-variant font-bold hover:bg-surface-container-high transition-colors">
        Back
      </button>
      <button id="nextBtn" disabled
              class="px-10 py-3 rounded-full bg-gradient-to-r from-primary to-primary-container text-white font-bold flex items-center gap-2 opacity-40 cursor-not-allowed transition-all">
        Review Needs
        <span class="material-symbols-outlined text-sm">arrow_forward</span>
      </button>
    </div>
  </div>

  <!-- Security note -->
  <p class="absolute bottom-6 text-on-surface-variant text-xs font-medium flex items-center gap-1.5 opacity-50">
    <span class="material-symbols-outlined text-sm">security</span>
    Secure analysis by SevaSetu AI Core
  </p>
</div>

<script>
// ── Get report ID from URL: /ngo/upload/processing/<report_id> ──
const reportId = window.location.pathname.split('/').pop();

// ── Steps config ────────────────────────────────────────────
const STEPS = [
  { text: 'Uploading document to secure storage…',   pct: 15 },
  { text: 'Extracting text and structure…',           pct: 30 },
  { text: 'Analyzing geographical data…',             pct: 50 },
  { text: 'Categorizing community pain points…',      pct: 68 },
  { text: 'Scoring urgency for each need…',           pct: 82 },
  { text: 'Finalizing needs & required skills…',      pct: 95 },
];

let currentStep  = 0;
let fakeProgress = 0;
let pollTimer    = null;
let stepTimer    = null;
let fileName     = '';

// ── Icon by extension ────────────────────────────────────────
function getFileIcon(name) {
  const ext = (name||'').split('.').pop().toLowerCase();
  return {pdf:'picture_as_pdf',docx:'article',xlsx:'table_chart',jpg:'image',jpeg:'image',png:'image'}[ext] || 'description';
}

// ── Render a completed step ──────────────────────────────────
function addCompletedStep(text) {
  const log = document.getElementById('stepLog');
  const el  = document.createElement('div');
  el.className = 'step-item flex items-center gap-3 text-sm text-on-surface-variant justify-center';
  el.innerHTML = `<span class="material-symbols-outlined text-sm text-primary" style="font-variation-settings:'FILL' 1">check_circle</span>
                  <span>${text}</span>`;
  log.appendChild(el);
}

function setActiveStep(text) {
  const log = document.getElementById('stepLog');
  // Remove any existing active step
  const existing = log.querySelector('.active-step');
  if (existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'step-item active-step flex items-center gap-3 text-sm text-on-surface font-semibold justify-center';
  el.innerHTML = `<span class="relative flex h-2 w-2">
    <span class="ping absolute inline-flex h-full w-full rounded-full bg-primary opacity-75"></span>
    <span class="relative inline-flex rounded-full h-2 w-2 bg-primary"></span>
  </span>
  <span>${text}</span>`;
  log.appendChild(el);
}

// ── Simulate progress while polling ─────────────────────────
function tickFakeProgress() {
  if (fakeProgress >= 95) return;
  fakeProgress = Math.min(95, fakeProgress + (95 - fakeProgress) * 0.03);
  document.getElementById('progressBar').style.width = fakeProgress + '%';
  document.getElementById('progressPct').textContent = Math.floor(fakeProgress) + '%';
}

function tickSteps() {
  if (currentStep < STEPS.length) {
    const step = STEPS[currentStep];
    if (currentStep > 0) addCompletedStep(STEPS[currentStep - 1].text);
    setActiveStep(step.text);
    fakeProgress = step.pct;
    document.getElementById('progressBar').style.width = step.pct + '%';
    document.getElementById('progressPct').textContent = step.pct + '%';
    currentStep++;
  }
}

// ── Finish state ─────────────────────────────────────────────
function setFinished(needsCount) {
  clearInterval(stepTimer);
  clearInterval(pollTimer);

  // Complete all steps
  const log = document.getElementById('stepLog');
  log.innerHTML = '';
  STEPS.forEach(s => addCompletedStep(s.text));

  // Add "done" line
  const done = document.createElement('div');
  done.className = 'step-item flex items-center gap-3 text-sm font-bold text-primary justify-center mt-2';
  done.innerHTML = `<span class="material-symbols-outlined text-primary" style="font-variation-settings:'FILL' 1">task_alt</span>
                    <span>Found <strong>${needsCount}</strong> community need${needsCount!==1?'s':''} — ready to review!</span>`;
  log.appendChild(done);

  // Progress to 100%
  document.getElementById('progressBar').style.width    = '100%';
  document.getElementById('progressPct').textContent    = '100%';

  // Enable Next button
  const btn = document.getElementById('nextBtn');
  btn.disabled = false;
  btn.classList.remove('opacity-40','cursor-not-allowed');
  btn.addEventListener('click', () => {
    window.location.href = `/ngo/upload/review/${reportId}`;
  });
}

// ── Poll /api/ngo/report/<id>/status every 3s ────────────────
async function pollStatus() {
  try {
    const res  = await fetch(`/api/ngo/report/${reportId}/status`);
    if (!res.ok) return;
    const data = await res.json();

    // Update file name
    if (data.file_name && !fileName) {
      fileName = data.file_name;
      document.getElementById('fileName').textContent = fileName;
      document.getElementById('fileIcon').textContent = getFileIcon(fileName);
    }

    if (data.status === 'processed' || data.status === 'done') {
      setFinished(data.needs_count || 0);
    } else if (data.status === 'failed') {
      clearInterval(pollTimer);
      clearInterval(stepTimer);
      document.getElementById('stepLog').innerHTML = `
        <div class="flex items-center gap-3 text-sm text-error justify-center">
          <span class="material-symbols-outlined text-sm">error</span>
          <span>Processing failed. Please try again.</span>
        </div>`;
      document.getElementById('nextBtn').textContent = 'Try Again';
      document.getElementById('nextBtn').disabled    = false;
      document.getElementById('nextBtn').onclick     = () => window.location.href = '/ngo/reports';
    }
  } catch {}
}

// ── Init ─────────────────────────────────────────────────────
if (!reportId || reportId === 'processing') {
  // No report id — just show demo
  document.getElementById('fileName').textContent = 'field_report.pdf';
}

// Tick steps every 4s (visual simulation)
setActiveStep(STEPS[0].text);
currentStep = 1;
stepTimer = setInterval(tickSteps, 4000);

// Poll backend every 3s
pollTimer = setInterval(pollStatus, 3000);
pollStatus(); // immediate first poll
</script>
</body>
</html>
