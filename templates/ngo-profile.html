{% extends "base.html" %}

{% block title %}SevaSetu Portal | NGO Profile{% endblock %}

{% block head %}
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .sage-gradient {
        background: linear-gradient(135deg, #006c44 0%, #4caf7d 100%);
    }
    .amber-gradient {
        background: linear-gradient(135deg, #855300 0%, #fea619 100%);
    }
</style>
{% endblock %}

{% block content %}
<div class="px-6 max-w-7xl mx-auto pb-20 pt-28">
    <!-- Header Section -->
    <header class="relative mb-12">
        <div class="relative px-8 flex flex-col md:flex-row items-end gap-6">
            <!-- NGO IMAGE -->
            <div class="w-40 h-40 rounded-full border-8 border-surface bg-surface-container-lowest shadow-2xl shadow-primary/10 overflow-hidden shrink-0 flex items-center justify-center">
                <img id="ngoImage" src="https://via.placeholder.com/150" alt="NGO Profile Image" class="w-3/4 h-3/4 object-contain" />
            </div>

            <!-- NGO INFO -->
            <div class="flex-1 pb-2">
                <div class="flex items-center gap-3 mb-1">
                    <!-- NAME -->
                    <h1 id="ngoName" class="text-4xl md:text-5xl font-black text-on-surface tracking-tight font-headline">NGO</h1>
                    <!-- VERIFIED BADGE -->
                    <span id="verifiedBadge" class="material-symbols-outlined text-primary text-3xl hidden" title="Verified NGO">verified</span>
                </div>
                <!-- TAGLINE -->
                <p id="ngoTagline" class="text-xl text-[#3e4942] font-medium max-w-2xl">
                    Empowering communities through collective action and compassion.
                </p>
            </div>

            <div class="flex gap-3 pb-4">
                <button id="messageBtn" class="bg-surface-container-highest text-on-surface px-8 py-3 rounded-full font-bold hover:scale-[1.05] transition-all">Message</button>
            </div>
        </div>
    </header>

    <!-- Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-8">
      </div>

      <div class="absolute inset-0 flex items-center justify-center">
        <div class="relative">
          <div class="absolute inset-0 animate-ping bg-primary/40 rounded-full"></div>

          <div
            class="relative bg-surface-container-lowest p-5 rounded-full shadow-2xl border-2 border-primary flex items-center justify-center">
            <span class="material-symbols-outlined text-primary text-4xl fill-1">
              location_on
            </span>
          </div>
        </div>
      </div>

      <div class="absolute bottom-8 left-1/2 -translate-x-1/2 w-[90%] md:w-auto">
        <div
          class="bg-white/80 dark:bg-black/40 backdrop-blur-xl border border-white/20 px-8 py-4 rounded-2xl shadow-[0_8px_32px_rgba(0,0,0,0.1)] flex items-center gap-4">
          <div class="w-10 h-10 rounded-lg sage-gradient flex items-center justify-center text-white shrink-0">
            <span class="material-symbols-outlined text-xl">explore</span>
          </div>
          <div class="text-left">
            <p class="text-[10px] font-black uppercase tracking-[0.2em] text-primary">Headquarters</p>
            <p id="ngoLocation" class="text-lg font-bold text-on-surface leading-tight">Loading address...</p>
          </div>
        </div>
      </div>

    </div>
  </section>
  <script>
    // Inject UID from server — works for both /ngo/<uid> and ?ngoId= (legacy)
    window.PROFILE_UID = "{{ profile_uid | default('') }}" || new URLSearchParams(location.search).get("ngoId");
  </script>
  <script src="{{ url_for('static', filename='js/ngo-profile.js') }}"></script>
{% endblock %}
